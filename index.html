<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Abra Card Collection Tracker</title>
    <style>
        :root {
            --color-bg-base: #0f172a;
            --color-bg-elevated: #020617;
            --color-bg-surface: #1e293b;
            --color-bg-muted: #334155;
            --color-text-primary: #f1f5f9;
            --color-text-secondary: #cbd5e1;
            --color-text-muted: #94a3b8;
            --color-text-accent: #38bdf8;
            --color-primary: #38bdf8;
            --color-primary-hover: #0ea5e9;
            --color-border: rgba(119, 124, 124, 0.3);
            --color-success: #10b981;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--color-bg-base);
            color: var(--color-text-primary);
            padding: 20px;
            line-height: 1.6;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            margin-bottom: 30px;
            padding: 20px;
            background: var(--color-bg-surface);
            border-radius: 12px;
            border: 1px solid var(--color-border);
        }

        h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
            color: var(--color-primary);
        }

        .stats {
            display: flex;
            gap: 20px;
            justify-content: center;
            margin-top: 15px;
            flex-wrap: wrap;
        }

        .stat-box {
            background: var(--color-bg-muted);
            padding: 15px 25px;
            border-radius: 8px;
            border: 1px solid var(--color-border);
        }

        .stat-value {
            font-size: 2rem;
            font-weight: bold;
            color: var(--color-primary);
        }

        .stat-label {
            font-size: 0.9rem;
            color: var(--color-text-secondary);
        }

        .controls {
            display: flex;
            gap: 15px;
            margin-bottom: 25px;
            flex-wrap: wrap;
            align-items: center;
        }

        select, input {
            padding: 10px 15px;
            border-radius: 8px;
            border: 1px solid var(--color-border);
            background: var(--color-bg-surface);
            color: var(--color-text-primary);
            font-size: 1rem;
            cursor: pointer;
        }

        select:focus, input:focus {
            outline: 2px solid var(--color-primary);
            outline-offset: 2px;
        }

        .btn {
            padding: 10px 20px;
            border-radius: 8px;
            border: none;
            background: var(--color-primary);
            color: var(--color-bg-base);
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn:hover {
            background: var(--color-primary-hover);
            transform: translateY(-2px);
        }

        .btn-secondary {
            background: var(--color-bg-muted);
            color: var(--color-text-primary);
        }

        .auth-section {
            background: var(--color-bg-surface);
            padding: 20px;
            border-radius: 12px;
            border: 1px solid var(--color-border);
            margin-bottom: 20px;
        }

        .auth-status {
            display: flex;
            align-items: center;
            gap: 15px;
            flex-wrap: wrap;
        }

        .status-indicator {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: #ef4444;
        }

        .status-indicator.connected {
            background: var(--color-success);
        }

        .cards-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
            margin-bottom: 40px;
        }

        .card {
            background: var(--color-bg-surface);
            border-radius: 12px;
            border: 1px solid var(--color-border);
            padding: 15px;
            transition: all 0.3s;
            cursor: pointer;
        }

        .card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 30px rgba(56, 189, 248, 0.2);
        }

        .card.owned {
            border-color: var(--color-success);
            box-shadow: 0 0 20px rgba(16, 185, 129, 0.3);
        }

        .card-image {
            width: 100%;
            height: 200px;
            background: var(--color-bg-muted);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 15px;
            position: relative;
            overflow: hidden;
        }

        .card-image img {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        .placeholder-text {
            color: var(--color-text-muted);
            font-size: 0.9rem;
            text-align: center;
            padding: 10px;
        }

        .card-name {
            font-size: 1.1rem;
            font-weight: 600;
            margin-bottom: 8px;
            color: var(--color-text-primary);
        }

        .card-set {
            font-size: 0.9rem;
            color: var(--color-text-secondary);
            margin-bottom: 5px;
        }

        .card-number {
            font-size: 0.85rem;
            color: var(--color-text-muted);
            margin-bottom: 5px;
        }

        .card-release {
            font-size: 0.85rem;
            color: var(--color-text-muted);
            margin-bottom: 12px;
        }

        .ownership-control {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px;
            background: var(--color-bg-muted);
            border-radius: 8px;
            border: 1px solid var(--color-border);
        }

        .radio-button {
            width: 24px;
            height: 24px;
            border: 2px solid var(--color-border);
            border-radius: 50%;
            position: relative;
            cursor: pointer;
            transition: all 0.2s;
        }

        .radio-button.checked {
            border-color: var(--color-success);
            background: var(--color-success);
        }

        .radio-button.checked::after {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 10px;
            height: 10px;
            background: white;
            border-radius: 50%;
        }

        .ownership-label {
            font-size: 0.95rem;
            color: var(--color-text-secondary);
            user-select: none;
        }

        .loading {
            text-align: center;
            padding: 40px;
            color: var(--color-text-secondary);
        }

        .firebase-config {
            background: var(--color-bg-elevated);
            padding: 20px;
            border-radius: 12px;
            border: 1px solid var(--color-border);
            margin-top: 20px;
        }

        .config-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 15px;
            margin-top: 15px;
        }

        .config-field {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        .config-field label {
            font-size: 0.9rem;
            color: var(--color-text-secondary);
        }

        .config-field input {
            width: 100%;
        }

        .error-message {
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.3);
            color: #fca5a5;
            padding: 15px;
            border-radius: 8px;
            margin-top: 15px;
        }

        .success-message {
            background: rgba(16, 185, 129, 0.1);
            border: 1px solid rgba(16, 185, 129, 0.3);
            color: #6ee7b7;
            padding: 15px;
            border-radius: 8px;
            margin-top: 15px;
        }

        @media (max-width: 768px) {
            h1 {
                font-size: 1.8rem;
            }
            
            .cards-grid {
                grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🔮 Abra Card Collection Tracker</h1>
            <p style="color: var(--color-text-secondary); margin-top: 10px;">Track every Abra Pokémon card variant</p>
            <div class="stats">
                <div class="stat-box">
                    <div class="stat-value" id="ownedCount">0</div>
                    <div class="stat-label">Owned</div>
                </div>
                <div class="stat-box">
                    <div class="stat-value" id="totalCount">0</div>
                    <div class="stat-label">Total Cards</div>
                </div>
                <div class="stat-box">
                    <div class="stat-value" id="percentageCount">0%</div>
                    <div class="stat-label">Complete</div>
                </div>
            </div>
        </header>

        <div class="auth-section">
            <div class="auth-status">
                <div class="status-indicator" id="statusIndicator"></div>
                <span id="authStatus">Not connected to Firebase</span>
                <button class="btn" id="setupBtn" onclick="toggleConfig()">Setup Firebase</button>
                <button class="btn btn-secondary" id="syncBtn" onclick="syncData()" style="display: none;">Sync Data</button>
            </div>
            
            <div class="firebase-config" id="firebaseConfig" style="display: none;">
                <h3 style="margin-bottom: 15px;">Firebase Configuration</h3>
                <p style="color: var(--color-text-secondary); font-size: 0.9rem; margin-bottom: 15px;">
                    Get these values from your Firebase Console → Project Settings → Your apps → Firebase SDK snippet (Config)
                </p>
                <div class="config-grid">
                    <div class="config-field">
                        <label>API Key</label>
                        <input type="text" id="apiKey" placeholder="AIza...">
                    </div>
                    <div class="config-field">
                        <label>Auth Domain</label>
                        <input type="text" id="authDomain" placeholder="your-app.firebaseapp.com">
                    </div>
                    <div class="config-field">
                        <label>Project ID</label>
                        <input type="text" id="projectId" placeholder="your-project-id">
                    </div>
                    <div class="config-field">
                        <label>Storage Bucket</label>
                        <input type="text" id="storageBucket" placeholder="your-app.appspot.com">
                    </div>
                    <div class="config-field">
                        <label>Messaging Sender ID</label>
                        <input type="text" id="messagingSenderId" placeholder="123456789">
                    </div>
                    <div class="config-field">
                        <label>App ID</label>
                        <input type="text" id="appId" placeholder="1:123:web:abc">
                    </div>
                </div>
                <div style="margin-top: 20px; display: flex; gap: 10px;">
                    <button class="btn" onclick="saveFirebaseConfig()">Save & Connect</button>
                    <button class="btn btn-secondary" onclick="clearFirebaseConfig()">Clear Config</button>
                </div>
                <div id="configMessage"></div>
            </div>
        </div>

        <div class="controls">
            <select id="sortOrder" onchange="sortCards()">
                <option value="release">Sort by Release Date</option>
                <option value="name">Sort by Name</option>
                <option value="set">Sort by Set</option>
            </select>
            
            <select id="filterOwned" onchange="filterCards()">
                <option value="all">Show All</option>
                <option value="owned">Owned Only</option>
                <option value="needed">Needed Only</option>
            </select>

            <input type="text" id="searchInput" placeholder="Search cards..." oninput="filterCards()">
        </div>

        <div class="loading" id="loading">Loading cards...</div>
        <div class="cards-grid" id="cardsGrid"></div>
    </div>

    <script type="module">
        const abraCards = [
            { id: 'base-43', name: 'Abra', set: 'Base Set', number: '43/102', release: '1999-01-09', imageUrl: 'https://images.pokemontcg.io/base1/43.png' },
            { id: 'base-43-shadowless', name: 'Abra (Shadowless)', set: 'Base Set Shadowless', number: '43/102', release: '1999-01-09', imageUrl: 'https://images.pokemontcg.io/base1/43.png' },
            { id: 'base-43-1st', name: 'Abra (1st Edition)', set: 'Base Set 1st Edition', number: '43/102', release: '1999-01-09', imageUrl: 'https://images.pokemontcg.io/base1/43.png' },
            { id: 'base2-43', name: 'Abra', set: 'Base Set 2', number: '43/130', release: '2000-02-24', imageUrl: 'https://images.pokemontcg.io/base2/43.png' },
            { id: 'legendary-63', name: 'Abra', set: 'Legendary Collection', number: '63/110', release: '2002-05-24', imageUrl: 'https://images.pokemontcg.io/base1/43.png' },
            { id: 'rocket-49', name: 'Abra', set: 'Team Rocket', number: '49/82', release: '2000-04-24', imageUrl: 'https://images.pokemontcg.io/base1/43.png' },
            { id: 'gym-heroes-91', name: "Sabrina's Abra", set: 'Gym Heroes', number: '91/132', release: '2000-08-14', imageUrl: 'https://images.pokemontcg.io/base1/43.png' },
            { id: 'gym-challenge-93', name: "Sabrina's Abra", set: 'Gym Challenge', number: '93/132', release: '2000-10-16', imageUrl: 'https://images.pokemontcg.io/base1/43.png' },
            { id: 'gym-challenge-94', name: "Sabrina's Abra", set: 'Gym Challenge', number: '94/132', release: '2000-10-16', imageUrl: 'https://images.pokemontcg.io/base1/43.png' },
            { id: 'wizards-promo-19', name: "Sabrina's Abra", set: 'Wizards Black Star Promos', number: '19', release: '2000-11-01', imageUrl: 'https://images.pokemontcg.io/base1/43.png' },
            { id: 'vending-s1', name: 'Abra', set: 'Vending Machine Set 1', number: 'N/A', release: '1999-06-01', imageUrl: 'https://images.pokemontcg.io/base1/43.png' },
            { id: 'expedition-93', name: 'Abra', set: 'Expedition', number: '93/165', release: '2002-09-15', imageUrl: 'https://images.pokemontcg.io/ex1/93.png' },
            { id: 'skyridge-46', name: 'Abra', set: 'Skyridge', number: '46/144', release: '2003-05-12', imageUrl: 'https://images.pokemontcg.io/sk/46.png' },
            { id: 'mcdonald-13', name: 'Abra', set: 'McDonalds Collection 2002', number: '13/18', release: '2002-07-01', imageUrl: 'https://images.pokemontcg.io/base1/43.png' },
            { id: 'mysterious-69', name: 'Abra', set: 'Mysterious Treasures', number: '69/123', release: '2007-08-01', imageUrl: 'https://images.pokemontcg.io/mt/69.png' },
            { id: '151-63', name: 'Abra', set: '151', number: '63/165', release: '2023-09-22', imageUrl: 'https://images.pokemontcg.io/sv3pt5/63.png' },
            { id: '151-63-holo', name: 'Abra (Cosmos Holo)', set: '151', number: '63/165', release: '2023-09-22', imageUrl: 'https://images.pokemontcg.io/sv3pt5/63.png' },
            { id: 'paldean-148', name: 'Abra', set: 'Paldean Fates', number: '148/91', release: '2024-01-26', imageUrl: 'https://images.pokemontcg.io/sv4pt5/148.png' },
            { id: 'twilight-80', name: 'Abra', set: 'Twilight Masquerade', number: '80/167', release: '2024-05-24', imageUrl: 'https://images.pokemontcg.io/sv6/80.png' },
            { id: 'mega-54', name: 'Abra', set: 'Mega Evolution', number: '54/132', release: '2025-09-26', imageUrl: 'https://images.pokemontcg.io/base1/43.png' },
            { id: 'topps-63', name: 'Abra #63', set: 'Topps TV Animation', number: '63', release: '1999-07-01', imageUrl: 'https://images.pokemontcg.io/base1/43.png' },
            { id: 'topps-ep21', name: 'Abra and the Psychic Showdown', set: 'Topps TV Animation Episodes', number: 'EP21', release: '2000-01-01', imageUrl: 'https://images.pokemontcg.io/base1/43.png' },
        ];

        let allCards = [];
        let ownedCards = new Set();
        let firebaseInitialized = false;
        let db = null;
        let auth = null;
        let currentUser = null;

        function initializeApp() {
            allCards = [...abraCards];
            loadOwnedCards();
            renderCards();
            updateStats();
            checkFirebaseConfig();
        }

        function loadOwnedCards() {
            const saved = JSON.parse(localStorage.getItem('abraCardsOwned') || '[]');
            ownedCards = new Set(saved);
        }

        function saveOwnedCards() {
            localStorage.setItem('abraCardsOwned', JSON.stringify([...ownedCards]));
            updateStats();
            
            if (firebaseInitialized && currentUser) {
                syncToFirebase();
            }
        }

        function toggleOwnership(cardId) {
            if (ownedCards.has(cardId)) {
                ownedCards.delete(cardId);
            } else {
                ownedCards.add(cardId);
            }
            saveOwnedCards();
            renderCards();
        }

        function renderCards() {
            const grid = document.getElementById('cardsGrid');
            const loading = document.getElementById('loading');
            
            loading.style.display = 'none';
            grid.innerHTML = '';
            
            const filteredCards = getFilteredCards();
            
            filteredCards.forEach(card => {
                const isOwned = ownedCards.has(card.id);
                const cardEl = document.createElement('div');
                cardEl.className = `card ${isOwned ? 'owned' : ''}`;
                
                cardEl.innerHTML = `
                    <div class="card-image">
                        <img src="${card.imageUrl}" alt="${card.name}" onerror="this.style.display='none'; this.nextElementSibling.style.display='flex';">
                        <div class="placeholder-text" style="display: none;">
                            <p>🔮 ${card.name}</p>
                        </div>
                    </div>
                    <div class="card-name">${card.name}</div>
                    <div class="card-set">${card.set}</div>
                    <div class="card-number">Card #${card.number}</div>
                    <div class="card-release">Released: ${formatDate(card.release)}</div>
                    <div class="ownership-control" onclick="toggleOwnership('${card.id}')">
                        <div class="radio-button ${isOwned ? 'checked' : ''}"></div>
                        <span class="ownership-label">${isOwned ? 'Owned ✓' : 'Mark as Owned'}</span>
                    </div>
                `;
                
                grid.appendChild(cardEl);
            });
        }

        function formatDate(dateStr) {
            const date = new Date(dateStr);
            return date.toLocaleDateString('en-US', { year: 'numeric', month: 'short', day: 'numeric' });
        }

        function sortCards() {
            const sortOrder = document.getElementById('sortOrder').value;
            
            allCards.sort((a, b) => {
                switch(sortOrder) {
                    case 'release':
                        return new Date(a.release) - new Date(b.release);
                    case 'name':
                        return a.name.localeCompare(b.name);
                    case 'set':
                        return a.set.localeCompare(b.set);
                    default:
                        return 0;
                }
            });
            
            renderCards();
        }

        function filterCards() {
            renderCards();
        }

        function getFilteredCards() {
            const filterOwned = document.getElementById('filterOwned').value;
            const searchTerm = document.getElementById('searchInput').value.toLowerCase();
            
            return allCards.filter(card => {
                const matchesSearch = card.name.toLowerCase().includes(searchTerm) || 
                                    card.set.toLowerCase().includes(searchTerm) ||
                                    card.number.toLowerCase().includes(searchTerm);
                
                const matchesFilter = filterOwned === 'all' ? true :
                                    filterOwned === 'owned' ? ownedCards.has(card.id) :
                                    !ownedCards.has(card.id);
                
                return matchesSearch && matchesFilter;
            });
        }

        function updateStats() {
            const owned = ownedCards.size;
            const total = allCards.length;
            const percentage = total > 0 ? Math.round((owned / total) * 100) : 0;
            
            document.getElementById('ownedCount').textContent = owned;
            document.getElementById('totalCount').textContent = total;
            document.getElementById('percentageCount').textContent = percentage + '%';
        }

        function toggleConfig() {
            const config = document.getElementById('firebaseConfig');
            config.style.display = config.style.display === 'none' ? 'block' : 'none';
        }

        function checkFirebaseConfig() {
            const config = JSON.parse(localStorage.getItem('firebaseConfig') || '{}');
            if (config.apiKey) {
                loadFirebaseConfig(config);
            }
        }

        function saveFirebaseConfig() {
            const config = {
                apiKey: document.getElementById('apiKey').value,
                authDomain: document.getElementById('authDomain').value,
                projectId: document.getElementById('projectId').value,
                storageBucket: document.getElementById('storageBucket').value,
                messagingSenderId: document.getElementById('messagingSenderId').value,
                appId: document.getElementById('appId').value
            };

            if (!config.apiKey || !config.authDomain || !config.projectId) {
                showConfigMessage('Please fill in at least API Key, Auth Domain, and Project ID', 'error');
                return;
            }

            localStorage.setItem('firebaseConfig', JSON.stringify(config));
            showConfigMessage('Configuration saved! Loading Firebase...', 'success');
            
            setTimeout(() => {
                loadFirebaseConfig(config);
            }, 1000);
        }

        function clearFirebaseConfig() {
            localStorage.removeItem('firebaseConfig');
            document.getElementById('apiKey').value = '';
            document.getElementById('authDomain').value = '';
            document.getElementById('projectId').value = '';
            document.getElementById('storageBucket').value = '';
            document.getElementById('messagingSenderId').value = '';
            document.getElementById('appId').value = '';
            firebaseInitialized = false;
            updateAuthStatus('Not connected', false);
            showConfigMessage('Configuration cleared', 'success');
        }

        function loadFirebaseConfig(config) {
            loadFirebaseSDK(config);
        }

        function loadFirebaseSDK(config) {
            if (window.firebase) {
                initializeFirebase(config);
                return;
            }

            const script1 = document.createElement('script');
            script1.src = 'https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js';
            
            const script2 = document.createElement('script');
            script2.src = 'https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js';
            
            const script3 = document.createElement('script');
            script3.src = 'https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js';

            script1.onload = () => {
                document.head.appendChild(script2);
            };

            script2.onload = () => {
                document.head.appendChild(script3);
            };

            script3.onload = () => {
                initializeFirebase(config);
            };

            script1.onerror = () => {
                showConfigMessage('Failed to load Firebase SDK', 'error');
            };

            document.head.appendChild(script1);
        }

        function initializeFirebase(config) {
            try {
                if (!firebase.apps.length) {
                    firebase.initializeApp(config);
                }
                
                auth = firebase.auth();
                db = firebase.firestore();
                
                auth.signInAnonymously().then((userCredential) => {
                    currentUser = userCredential.user;
                    firebaseInitialized = true;
                    updateAuthStatus('Connected to Firebase', true);
                    document.getElementById('syncBtn').style.display = 'inline-block';
                    showConfigMessage('Successfully connected to Firebase!', 'success');
                    
                    loadFromFirebase();
                }).catch((error) => {
                    showConfigMessage('Firebase authentication error: ' + error.message, 'error');
                });

            } catch (error) {
                showConfigMessage('Firebase initialization error: ' + error.message, 'error');
            }
        }

        function syncToFirebase() {
            if (!firebaseInitialized || !currentUser) return;

            db.collection('collections').doc(currentUser.uid).set({
                ownedCards: [...ownedCards],
                lastUpdated: firebase.firestore.FieldValue.serverTimestamp()
            }).then(() => {
                showConfigMessage('Data synced to Firebase successfully!', 'success');
                setTimeout(() => {
                    document.getElementById('configMessage').innerHTML = '';
                }, 3000);
            }).catch((error) => {
                showConfigMessage('Sync error: ' + error.message, 'error');
            });
        }

        function loadFromFirebase() {
            if (!firebaseInitialized || !currentUser) return;

            db.collection('collections').doc(currentUser.uid).get().then((doc) => {
                if (doc.exists) {
                    const data = doc.data();
                    ownedCards = new Set(data.ownedCards || []);
                    saveOwnedCards();
                    renderCards();
                    showConfigMessage('Data loaded from Firebase!', 'success');
                }
            }).catch((error) => {
                console.error('Load error:', error);
            });
        }

        function syncData() {
            if (firebaseInitialized && currentUser) {
                syncToFirebase();
            }
        }

        function updateAuthStatus(message, connected) {
            document.getElementById('authStatus').textContent = message;
            const indicator = document.getElementById('statusIndicator');
            if (connected) {
                indicator.classList.add('connected');
            } else {
                indicator.classList.remove('connected');
            }
        }

        function showConfigMessage(message, type) {
            const messageEl = document.getElementById('configMessage');
            messageEl.className = type === 'error' ? 'error-message' : 'success-message';
            messageEl.textContent = message;
        }

        window.toggleOwnership = toggleOwnership;
        window.toggleConfig = toggleConfig;
        window.saveFirebaseConfig = saveFirebaseConfig;
        window.clearFirebaseConfig = clearFirebaseConfig;
        window.syncData = syncData;
        window.sortCards = sortCards;
        window.filterCards = filterCards;

        initializeApp();
    </script>
</body>
</html>
