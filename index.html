<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Abra Card Tracker (Firestore)</title>
  <style>
    :root{
      --bg:#0b0f17; --panel:#121a2a; --muted:#9db0d0; --text:#eaf0ff;
      --accent:#7c5cff; --ok:#34d399; --bad:#fb7185; --line:#23314f;
    }
    body{ margin:0; font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial; background:var(--bg); color:var(--text); }
    header{ padding:16px 16px 10px; border-bottom:1px solid var(--line); background:linear-gradient(180deg,#0c1220,#0b0f17); position:sticky; top:0; z-index:10; }
    h1{ font-size:16px; margin:0 0 10px; letter-spacing:.2px; }
    .row{ display:flex; gap:10px; flex-wrap:wrap; align-items:center; }
    button{
      border:1px solid var(--line); background:var(--panel); color:var(--text);
      padding:10px 12px; border-radius:10px; cursor:pointer;
    }
    button.primary{ background:var(--accent); border-color:transparent; }
    button.ghost{ background:transparent; }
    button:disabled{ opacity:.5; cursor:not-allowed; }
    input, select{
      border:1px solid var(--line); background:var(--panel); color:var(--text);
      padding:10px 12px; border-radius:10px;
    }
    .meta{ color:var(--muted); font-size:12px; }
    main{ padding:16px; }
    .grid{ display:grid; grid-template-columns:repeat(auto-fill,minmax(280px,1fr)); gap:12px; }
    .card{
      border:1px solid var(--line); background:var(--panel); border-radius:14px;
      overflow:hidden; display:flex; gap:12px; padding:12px;
    }
    .thumb{
      width:84px; height:118px; border-radius:10px; flex:0 0 auto;
      background:#0a0f1c; border:1px solid #1f2a44; display:flex; align-items:center; justify-content:center;
      color:var(--muted); font-size:11px; text-align:center; padding:6px;
    }
    .info{ min-width:0; flex:1; }
    .title{ font-weight:650; font-size:13px; margin:0 0 6px; }
    .sub{ color:var(--muted); font-size:12px; margin:0 0 8px; }
    .actions{ display:flex; justify-content:space-between; align-items:center; margin-top:10px; }
    .tick{
      display:inline-flex; align-items:center; gap:8px; user-select:none; cursor:pointer;
      font-size:12px; color:var(--muted);
    }
    .radio{
      width:18px; height:18px; border-radius:999px; border:2px solid var(--muted);
      display:inline-flex; align-items:center; justify-content:center;
    }
    .radio::after{
      content:""; width:10px; height:10px; border-radius:999px; background:transparent;
      transform:scale(.8);
    }
    .tick[data-owned="true"]{ color:var(--text); }
    .tick[data-owned="true"] .radio{ border-color:var(--ok); }
    .tick[data-owned="true"] .radio::after{ background:var(--ok); }
    .pill{ font-size:12px; padding:6px 10px; border-radius:999px; border:1px solid var(--line); color:var(--muted); }
    .pill.ok{ color:var(--ok); border-color:rgba(52,211,153,.4); }
    .pill.bad{ color:var(--bad); border-color:rgba(251,113,133,.4); }
    .divider{ height:1px; background:var(--line); margin:12px 0; }
    details{ border:1px solid var(--line); border-radius:12px; padding:10px 12px; background:rgba(18,26,42,.6); }
    summary{ cursor:pointer; color:var(--text); }
    .formgrid{ display:grid; grid-template-columns:repeat(auto-fit,minmax(180px,1fr)); gap:10px; margin-top:10px; }
    .hint{ color:var(--muted); font-size:12px; margin:8px 0 0; }
    .err{ color:var(--bad); font-size:12px; white-space:pre-wrap; }
  </style>
</head>

<body>
<header>
  <h1>Abra Card Tracker</h1>

  <div class="row">
    <button id="btnGoogle" class="primary">Sign in with Google</button>
    <button id="btnApple">Sign in with Apple</button>
    <button id="btnLogout" class="ghost" disabled>Sign out</button>

    <span id="authPill" class="pill bad">Signed out</span>
    <span id="stats" class="pill">Owned: 0 / 0</span>
  </div>

  <div class="divider"></div>

  <div class="row">
    <input id="q" placeholder="Search (set, variant, number…)" style="min-width:240px; flex:1;" />
    <select id="sort">
      <option value="dateAsc">Release date ↑</option>
      <option value="dateDesc">Release date ↓</option>
      <option value="setAsc">Set A→Z</option>
      <option value="nameAsc">Name A→Z</option>
    </select>
    <select id="filterOwned">
      <option value="all">All</option>
      <option value="owned">Owned</option>
      <option value="needed">Needed</option>
    </select>
    <span class="meta">Cards load from Firestore.</span>
  </div>

  <div class="divider"></div>

  <details id="adminPanel">
    <summary>Admin: add a card (requires admin claim)</summary>
    <div class="formgrid">
      <input id="f_id" placeholder="cardId (unique, e.g. sv151-063)" />
      <input id="f_name" placeholder="name (Abra)" />
      <input id="f_set" placeholder="set (e.g. Base Set)" />
      <input id="f_number" placeholder="number (e.g. 43/102)" />
      <input id="f_variant" placeholder="variant (e.g. 1st Ed)" />
      <input id="f_release" placeholder="releaseDate (YYYY-MM-DD)" />
      <input id="f_img" placeholder="imageUrl (optional)" />
    </div>
    <div class="row" style="margin-top:10px;">
      <button id="btnAddCard">Add / Update card</button>
      <button id="btnSeed">Seed starter Abra cards</button>
      <span class="meta">Seeding is safe to run multiple times.</span>
    </div>
    <p class="hint">Tip: lock down /cards writes to admins using Security Rules + custom claims. [web:79]</p>
    <div id="adminErr" class="err"></div>
  </details>
</header>

<main>
  <div id="loadState" class="meta">Loading…</div>
  <div class="divider"></div>
  <div id="grid" class="grid"></div>
</main>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-app.js";
  import {
    getAuth, onAuthStateChanged, signInWithPopup,
    GoogleAuthProvider, OAuthProvider, signOut
  } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-auth.js";
  import {
    getFirestore,
    collection, doc, setDoc,
    onSnapshot, query, orderBy
  } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyDjtVO0yloDlqmSQhNeaI1sHt0XCe0gYPQ",
    authDomain: "abra-collection-c63e6.firebaseapp.com",
    projectId: "abra-collection-c63e6",
    storageBucket: "abra-collection-c63e6.firebasestorage.app",
    messagingSenderId: "205587224372",
    appId: "1:205587224372:web:768e8689136fe246b4b761"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db = getFirestore(app);

  const elGrid = document.querySelector("#grid");
  const elQ = document.querySelector("#q");
  const elSort = document.querySelector("#sort");
  const elFilterOwned = document.querySelector("#filterOwned");
  const elStats = document.querySelector("#stats");
  const elAuthPill = document.querySelector("#authPill");
  const elLoadState = document.querySelector("#loadState");
  const adminPanel = document.querySelector("#adminPanel");
  const adminErr = document.querySelector("#adminErr");

  const btnGoogle = document.querySelector("#btnGoogle");
  const btnApple = document.querySelector("#btnApple");
  const btnLogout = document.querySelector("#btnLogout");

  const btnAddCard = document.querySelector("#btnAddCard");
  const btnSeed = document.querySelector("#btnSeed");

  const f_id = document.querySelector("#f_id");
  const f_name = document.querySelector("#f_name");
  const f_set = document.querySelector("#f_set");
  const f_number = document.querySelector("#f_number");
  const f_variant = document.querySelector("#f_variant");
  const f_release = document.querySelector("#f_release");
  const f_img = document.querySelector("#f_img");

  let currentUser = null;
  let ownedMap = {};
  let cards = []; // loaded from Firestore

  let unsubOwned = null;
  let unsubCards = null;

  btnGoogle.addEventListener("click", async () => {
    const provider = new GoogleAuthProvider();
    await signInWithPopup(auth, provider);
  });

  btnApple.addEventListener("click", async () => {
    const provider = new OAuthProvider("apple.com");
    await signInWithPopup(auth, provider);
  });

  btnLogout.addEventListener("click", async () => {
    await signOut(auth);
  });

  function setAuthUi(signedIn) {
    btnLogout.disabled = !signedIn;
    btnGoogle.disabled = signedIn;
    btnApple.disabled = signedIn;

    elAuthPill.textContent = signedIn ? "Signed in" : "Signed out";
    elAuthPill.classList.toggle("ok", signedIn);
    elAuthPill.classList.toggle("bad", !signedIn);
  }

  function startCardsListener() {
    if (unsubCards) unsubCards();

    // Order by releaseDate in Firestore query [web:74]
    const qCards = query(collection(db, "cards"), orderBy("releaseDate", "asc"));

    unsubCards = onSnapshot(qCards, (snap) => {
      cards = snap.docs.map(d => ({ id: d.id, ...d.data() }));
      elLoadState.textContent = `Loaded ${cards.length} cards`;
      render();
    }, (err) => {
      elLoadState.textContent = "Failed to load cards (check rules + indexes).";
      console.error(err);
    });
  }

  function startOwnedListener(uid) {
    if (unsubOwned) unsubOwned();
    const ref = doc(db, "users", uid, "state", "owned");

    unsubOwned = onSnapshot(ref, (snap) => {
      const data = snap.exists() ? snap.data() : {};
      ownedMap = (data && data.owned) ? data.owned : {};
      render();
    });
  }

  async function setOwned(cardId, owned) {
    if (!currentUser) return;
    const ref = doc(db, "users", currentUser.uid, "state", "owned");
    const next = { ...ownedMap, [cardId]: !!owned };
    // setDoc merge used for updating documents [web:68]
    await setDoc(ref, { owned: next }, { merge: true });
  }

  function computeVisibleCards() {
    const q = elQ.value.trim().toLowerCase();
    let list = cards.slice();

    if (q) {
      list = list.filter(c => {
        const hay = `${c.name||""} ${c.set||""} ${c.number||""} ${c.variant||""}`.toLowerCase();
        return hay.includes(q);
      });
    }

    const ownedFilter = elFilterOwned.value;
    if (ownedFilter === "owned") list = list.filter(c => !!ownedMap[c.id]);
    if (ownedFilter === "needed") list = list.filter(c => !ownedMap[c.id]);

    const sort = elSort.value;
    list.sort((a,b) => {
      const ad = (a.releaseDate || "");
      const bd = (b.releaseDate || "");
      if (sort === "dateAsc") return ad.localeCompare(bd) || (a.set||"").localeCompare(b.set||"");
      if (sort === "dateDesc") return bd.localeCompare(ad) || (a.set||"").localeCompare(b.set||"");
      if (sort === "setAsc") return (a.set||"").localeCompare(b.set||"") || (a.number||"").localeCompare(b.number||"");
      if (sort === "nameAsc") return (a.name||"").localeCompare(b.name||"") || (a.set||"").localeCompare(b.set||"");
      return 0;
    });

    return list;
  }

  function updateStats() {
    const total = cards.length;
    const owned = cards.reduce((n,c) => n + (ownedMap[c.id] ? 1 : 0), 0);
    elStats.textContent = `Owned: ${owned} / ${total}`;
  }

  function cardThumb(card){
    if (card.imageUrl) {
      const safe = String(card.imageUrl).replaceAll('"','&quot;');
      return `<img src="${safe}" alt="${card.name||"Card"}" style="width:100%;height:100%;object-fit:cover;border-radius:10px;" />`;
    }
    return `<div>${card.set||"Unknown set"}<br/>${card.number||""}</div>`;
  }

  function render() {
    updateStats();
    const visible = computeVisibleCards();

    elGrid.innerHTML = visible.map(card => {
      const isOwned = !!ownedMap[card.id];
      return `
        <div class="card" data-id="${card.id}">
          <div class="thumb">${cardThumb(card)}</div>
          <div class="info">
            <p class="title">${card.name || card.id} <span class="meta">(${card.variant || "Variant"})</span></p>
            <p class="sub">${card.set || "Unknown set"} • ${card.number || ""} • ${card.releaseDate || ""}</p>
            <div class="actions">
              <label class="tick" data-owned="${isOwned}" title="Toggle owned">
                <span class="radio" aria-hidden="true"></span>
                <span>${isOwned ? "Owned" : "Not owned"}</span>
              </label>
              <span class="meta">${currentUser ? "Synced" : "Sign in to sync"}</span>
            </div>
          </div>
        </div>
      `;
    }).join("");

    elGrid.querySelectorAll(".card").forEach(node => {
      const cardId = node.getAttribute("data-id");
      node.querySelector(".tick").addEventListener("click", async () => {
        if (!currentUser) { alert("Please sign in to save owned status."); return; }
        await setOwned(cardId, !ownedMap[cardId]);
      });
    });
  }

  elQ.addEventListener("input", render);
  elSort.addEventListener("change", render);
  elFilterOwned.addEventListener("change", render);

  // Admin helpers (writes to /cards; your rules should restrict this to admins) [web:79]
  async function upsertCard(cardId, data) {
    adminErr.textContent = "";
    const ref = doc(db, "cards", cardId);
    await setDoc(ref, data, { merge: true }); // set/update doc [web:68]
  }

  btnAddCard.addEventListener("click", async () => {
    try{
      const id = f_id.value.trim();
      if (!id) throw new Error("cardId is required");
      await upsertCard(id, {
        name: f_name.value.trim() || "Abra",
        set: f_set.value.trim(),
        number: f_number.value.trim(),
        variant: f_variant.value.trim(),
        releaseDate: f_release.value.trim(),
        imageUrl: f_img.value.trim()
      });
    } catch(e){
      adminErr.textContent = String(e?.message || e);
    }
  });

  btnSeed.addEventListener("click", async () => {
    try{
      const seed = [
        { id:"base-43-unlimited", name:"Abra", set:"Base Set", number:"43/102", releaseDate:"1999-01-09", variant:"Unlimited", imageUrl:"" },
        { id:"base-43-shadowless", name:"Abra", set:"Base Set", number:"43/102", releaseDate:"1999-01-09", variant:"Shadowless", imageUrl:"" },
        { id:"base-43-1sted", name:"Abra", set:"Base Set", number:"43/102", releaseDate:"1999-01-09", variant:"1st Edition", imageUrl:"" },
        { id:"teamrocket-49", name:"Abra", set:"Team Rocket", number:"49/82", releaseDate:"2000-04-24", variant:"Unlimited", imageUrl:"" },
        { id:"mcd-2011-4", name:"Abra", set:"McDonald's Collection 2011", number:"4/12", releaseDate:"2011-06-17", variant:"Promo", imageUrl:"" },
        { id:"sv3pt5-151-063", name:"Abra", set:"Scarlet & Violet—151", number:"063/165", releaseDate:"2023-09-22", variant:"Regular", imageUrl:"" },
        { id:"topps-tv-63", name:"Abra", set:"Topps TV Animation Edition", number:"#63", releaseDate:"1999-01-01", variant:"Topps", imageUrl:"" }
      ];
      for (const c of seed) {
        await upsertCard(c.id, c);
      }
    } catch(e){
      adminErr.textContent = String(e?.message || e);
    }
  });

  onAuthStateChanged(auth, (user) => {
    currentUser = user || null;
    setAuthUi(!!currentUser);

    if (unsubOwned) { unsubOwned(); unsubOwned = null; }
    if (currentUser) startOwnedListener(currentUser.uid);
    else ownedMap = {};

    render();
  });

  // Start catalog listener immediately (public read).
  startCardsListener();

  render();
</script>
</body>
</html>
